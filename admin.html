<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유어스웹 | 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
    <style>
        body { font-family: 'Pretendard Variable', sans-serif; background-color: #F8FAFC; color: #1E293B; }
        .inquiry-card { transition: all 0.3s ease; }
        .inquiry-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="bg-[#0A2540] text-white py-4 px-6 sm:px-12 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-[#3B6EFF] rounded-sm transform rotate-45 flex items-center justify-center">
                <span class="text-white font-bold -rotate-45 text-sm">YW</span>
            </div>
            <span class="font-bold tracking-tight text-lg">Admin Dashboard</span>
        </div>
        <div id="auth-section" class="flex items-center gap-2 sm:gap-4">
            <span id="user-name" class="text-[10px] sm:text-sm opacity-80 max-w-[120px] sm:max-w-none truncate"></span>
            <button id="auth-btn" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 sm:px-4 sm:py-2 rounded-[4px] text-[10px] sm:text-sm font-semibold transition-colors shrink-0">
                로그인 중...
            </button>
        </div>
    </nav>

    <!-- Password Gate -->
    <div id="password-gate" class="fixed inset-0 z-[100] bg-[#0A2540] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-lg shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-blue-50 text-[#3B6EFF] rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v2m0-2h2m-2 0H10m11-3.5a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-[#0A2540] mb-2">관리자 접속</h2>
            <p class="text-slate-500 mb-8 text-sm">비밀번호를 입력하여 접속하세요.</p>
            <input type="password" id="admin-password" class="w-full px-4 py-3 border border-slate-200 rounded-md mb-4 focus:ring-2 focus:ring-[#3B6EFF] focus:outline-none" placeholder="비밀번호">
            <button id="login-submit" class="w-full bg-[#3B6EFF] text-white font-bold py-3 rounded-md hover:bg-[#2d56cc] transition-colors">
                입장하기
            </button>
            <p id="pw-error" class="text-red-500 text-xs mt-3 hidden">비밀번호가 올바르지 않습니다.</p>
        </div>
    </div>

    <!-- Main Content -->
    <main id="admin-content" class="max-w-7xl mx-auto px-6 py-12 hidden">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div>
                <h1 class="text-3xl font-bold text-[#0A2540] mb-2">프로젝트 문의 내역</h1>
                <p class="text-slate-500">유어스웹에 접수된 모든 문의를 관리합니다.</p>
            </div>
            <div class="bg-white p-2 rounded-lg border border-slate-200 flex items-center gap-2">
                <span id="inquiry-count" class="bg-[#3B6EFF] text-white text-xs font-bold px-2 py-1 rounded-full">0</span>
                <span class="text-sm font-medium text-slate-600 pr-2">Total Inquiries</span>
            </div>
        </div>

        <!-- Inquiry List -->
        <div id="inquiry-list" class="grid grid-cols-1 gap-6">
            <!-- Shimmer Loading -->
            <div class="animate-pulse space-y-4">
                <div class="h-32 bg-slate-200 rounded-lg"></div>
                <div class="h-32 bg-slate-200 rounded-lg"></div>
                <div class="h-32 bg-slate-200 rounded-lg"></div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
            </div>
            <h3 class="text-lg font-bold text-slate-800">문의 내역이 없습니다.</h3>
            <p class="text-slate-500">아직 접수된 프로젝트 문의가 없습니다.</p>
        </div>

        <!-- No Access State -->
        <div id="no-access" class="hidden flex flex-col items-center justify-center py-24 text-center">
            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m0 0v2m0-2h2m-2 0H10m11-3.5a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <h3 class="text-lg font-bold text-slate-800">접근 권한이 없습니다.</h3>
            <p class="text-slate-500">지정된 관리자 계정으로 로그인해주세요.</p>
            <button onclick="location.href='/'" class="mt-6 text-[#3B6EFF] font-semibold hover:underline">홈으로 돌아가기</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js';
        import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js';

        // Fetch config from the secret file (since this is client side, we use the values directly from what we read earlier)
        const firebaseConfig = {
            projectId: "yoursweb-de245",
            appId: "1:299282121947:web:8f1cb5db8c1dfbf894f8fe",
            apiKey: "AIzaSyDB6KhmbXGbiW8LiNgd5qZyk-TnLJ_cMG4",
            authDomain: "yoursweb-de245.firebaseapp.com",
            storageBucket: "yoursweb-de245.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, "ai-studio-c74210e1-7359-47ff-9653-df6e4c38a1ea");
        const provider = new GoogleAuthProvider();

        const authBtn = document.getElementById('auth-btn');
        const userNameSpan = document.getElementById('user-name');
        const inquiryList = document.getElementById('inquiry-list');
        const inquiryCount = document.getElementById('inquiry-count');
        const emptyState = document.getElementById('empty-state');
        const noAccess = document.getElementById('no-access');

        const passwordGate = document.getElementById('password-gate');
        const passwordInput = document.getElementById('admin-password');
        const loginSubmit = document.getElementById('login-submit');
        const pwError = document.getElementById('pw-error');
        const adminContent = document.getElementById('admin-content');

        const ADMIN_EMAIL = '31choichoi@gmail.com';
        const ADMIN_PW = '7777';

        const SURVEY_MAP = {
            q1: {
                title: '디자인 무드',
                A: '미니멀 · 모던',
                B: '럭셔리 · 프리미엄',
                C: '따뜻함 · 친근함',
                D: '다이나믹 · 트렌디',
                E: '프로페셔널 · 신뢰',
                F: '잘 모르겠음'
            },
            q2: {
                title: '레이아웃 스타일',
                A: '전체 화면 히어로 + 스토리텔링형',
                B: '그리드 기반 정보 전달',
                C: '매거진 스타일',
                D: '원페이지 심플 랜딩',
                E: '잘 모르겠음'
            },
            q3: {
                title: '핵심 섹션',
                A: '히어로', B: '회사소개', C: '서비스/프로젝트', D: '포트폴리오',
                E: '고객 후기', F: '가격 표', G: '진행 프로세스', H: 'FAQ',
                I: '문의/예약 폼', J: '블로그', K: '위치/지도', L: '팀원',
                M: '기타', N: '추천'
            },
            q4: {
                title: '타이포그래피',
                A: '모던 고딕',
                B: '우아한 세리프',
                C: '볼드 디스플레이',
                D: '핸드라이팅',
                E: '잘 모르겠음'
            },
            q5: {
                title: '인터랙션 강도',
                A: '정적임 · 차분함',
                B: '중간',
                C: '강함',
                D: '잘 모르겠음'
            }
        };

        let inquiryUnsubscribe = null;
        let requestUnsubscribe = null;
        let lastInquiryId = null;
        let lastRequestId = null;
        let isInitialLoad = true;

        // Notification Sound (Simple Beep)
        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            } catch (e) {
                console.warn('Audio feedback failed:', e);
            }
        }

        // Title Flash Notification
        let flashInterval = null;
        function startTitleFlash() {
            if (flashInterval) return;
            const originalTitle = document.title;
            flashInterval = setInterval(() => {
                document.title = document.title === originalTitle ? "🔔 NEW INQUIRY!" : originalTitle;
            }, 1000);
            
            window.addEventListener('mousemove', stopTitleFlash, { once: true });
            window.addEventListener('click', stopTitleFlash, { once: true });
        }

        function stopTitleFlash() {
            if (flashInterval) {
                clearInterval(flashInterval);
                flashInterval = null;
                document.title = "관리자 모드 — 유어스웹 (Yours Web)";
            }
        }

        function showNotificationToast(data) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 right-8 bg-[#3B6EFF] text-white p-6 rounded-lg shadow-2xl flex flex-col gap-2 z-[9999] animate-bounce';
            toast.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="bg-white/20 p-2 rounded-full">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    </div>
                    <div>
                        <p class="font-bold">🔔 새로운 ${data.type || '문의'} 도착!</p>
                        <p class="text-xs opacity-90">${data.company || '회사명 없음'} - ${data.name || '성함 없음'}님</p>
                    </div>
                </div>
                <button class="mt-2 text-xs font-bold hover:underline self-end">닫기</button>
            `;
            document.body.appendChild(toast);
            
            toast.querySelector('button').onclick = () => toast.remove();
            setTimeout(() => toast.remove(), 10000);
            
            playNotificationSound();
            startTitleFlash();
        }

        // Check password first
        function checkPassword() {
            const inputVal = passwordInput.value.trim();
            if (inputVal === ADMIN_PW) {
                passwordGate.classList.add('hidden');
                adminContent.classList.remove('hidden');
                localStorage.setItem('admin_access', 'true');
                handleAuth();
                pwError.classList.add('hidden');
            } else {
                pwError.classList.remove('hidden');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        loginSubmit.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // On load, check if already unlocked
        if (localStorage.getItem('admin_access') === 'true') {
            passwordGate.classList.add('hidden');
            adminContent.classList.remove('hidden');
        }

        function handleAuth() {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userNameSpan.textContent = `${user.displayName} (${user.email})`;
                    userNameSpan.classList.remove('hidden');
                    authBtn.textContent = '로그아웃';
                    
                    if (user.email === ADMIN_EMAIL) {
                        noAccess.classList.add('hidden');
                        loadData();
                    } else {
                        inquiryList.innerHTML = '';
                        const noAccessMsg = noAccess.querySelector('p');
                        if (noAccessMsg) noAccessMsg.textContent = `현재 계정(${user.email})은 관리자 권한이 없습니다.`;
                        noAccess.classList.remove('hidden');
                    }
                } else {
                    userNameSpan.classList.add('hidden');
                    authBtn.textContent = 'Google 로그인';
                    inquiryList.innerHTML = '';
                }
            });
        }

        if (localStorage.getItem('admin_access') === 'true') handleAuth();

        authBtn.addEventListener('click', () => {
            if (auth.currentUser) {
                signOut(auth);
                localStorage.removeItem('admin_access');
                location.reload();
            } else {
                authBtn.disabled = true;
                authBtn.textContent = '로그인 중...';
                signInWithPopup(auth, provider).then(() => {
                    authBtn.disabled = false;
                }).catch(err => {
                    authBtn.disabled = false;
                    authBtn.textContent = 'Google 로그인';
                    console.error("Login failed:", err);
                    
                    let errorMsg = "로그인 중 오류가 발생했습니다.";
                    if (err.code === 'auth/popup-blocked') {
                        errorMsg = "팝업이 차단되었습니다. 브라우저 설정에서 팝업을 허용해주세요.";
                    } else if (err.code === 'auth/unauthorized-domain') {
                        errorMsg = "승인되지 않은 도메인입니다. Firebase Console에서 현재 도메인을 '승인된 도메인'에 추가해야 합니다.\n현재 도메인: " + window.location.hostname;
                    } else if (err.code === 'auth/popup-closed-by-user') {
                        errorMsg = "로그인 창이 닫혔습니다. 다시 시도해주세요.";
                    } else if (err.code === 'auth/cancelled-popup-request') {
                        errorMsg = "이미 로그인 창이 열려있습니다.";
                    }
                    
                    alert(errorMsg + "\n(Error Code: " + err.code + ")");
                });
            }
        });

        function loadData() {
            loadInquiries();
            loadRequests();
        }

        function loadInquiries() {
            const q = query(collection(db, 'inquiries'), orderBy('createdAt', 'desc'));
            
            inquiryUnsubscribe = onSnapshot(q, (snapshot) => {
                // We'll manage two lists, so we need a containers
                renderInquiries(snapshot);
            }, (error) => {
                console.error("Inquiries error:", error);
                if (error.message.includes('permission')) noAccess.classList.remove('hidden');
            });
        }

        function loadRequests() {
            const q = query(collection(db, 'requests'), orderBy('timestamp', 'desc'));
            
            requestUnsubscribe = onSnapshot(q, (snapshot) => {
                renderRequests(snapshot);
            }, (error) => {
                console.error("Requests error:", error);
            });
        }

        let allInquiries = [];
        let allRequests = [];

        function renderAll() {
            inquiryList.innerHTML = '';
            
            const combined = [
                ...allInquiries.map(item => ({ ...item, sortDate: item.data.createdAt?.toDate() || new Date(0), type: 'inquiry' })),
                ...allRequests.map(item => ({ ...item, sortDate: item.data.timestamp?.toDate() || new Date(0), type: 'request' }))
            ].sort((a, b) => b.sortDate - a.sortDate);

            inquiryCount.textContent = combined.length;

            if (combined.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            combined.forEach(item => {
                const card = item.type === 'inquiry' ? 
                    createInquiryCard(item.id, item.data) : 
                    createRequestCard(item.id, item.data);
                inquiryList.appendChild(card);
            });
        }

        function renderInquiries(snapshot) {
            allInquiries = [];
            snapshot.forEach(docSnap => {
                allInquiries.push({ id: docSnap.id, data: docSnap.data() });
            });
            
            const newest = allInquiries[0];
            if (!isInitialLoad && newest && newest.id !== lastInquiryId) {
                showNotificationToast({ ...newest.data, type: '일반 문의' });
                lastInquiryId = newest.id;
            } else if (isInitialLoad && newest) {
                lastInquiryId = newest.id;
            }
            
            renderAll();
        }

        function renderRequests(snapshot) {
            allRequests = [];
            snapshot.forEach(docSnap => {
                allRequests.push({ id: docSnap.id, data: docSnap.data() });
            });
            
            const newest = allRequests[0];
            if (!isInitialLoad && newest && newest.id !== lastRequestId) {
                showNotificationToast({ 
                    company: newest.data.industry || 'Survey', 
                    name: newest.data.name || 'Anonymous',
                    type: '설계 신청' 
                });
                lastRequestId = newest.id;
            } else if (isInitialLoad && newest) {
                lastRequestId = newest.id;
            }

            renderAll();
            isInitialLoad = false;
        }

        function createRequestCard(id, data) {
            const div = document.createElement('div');
            div.className = 'inquiry-card bg-white border border-slate-200 rounded-lg p-6 sm:p-8 flex flex-col md:flex-row gap-6 border-l-4 border-l-indigo-500';
            
            const date = data.timestamp?.toDate ? data.timestamp.toDate() : new Date();
            const dateStr = date.toLocaleString('ko-KR', { 
                year: 'numeric', month: '2-digit', day: '2-digit', 
                hour: '2-digit', minute: '2-digit' 
            });

            const mood = SURVEY_MAP.q1[data.q1] || data.q1 || '—';
            const layout = SURVEY_MAP.q2[data.q2] || data.q2 || '—';
            const typo = SURVEY_MAP.q4[data.q4] || data.q4 || '—';
            const interaction = SURVEY_MAP.q5[data.q5] || data.q5 || '—';
            
            // Handle multi-select Q3
            const sections = (data.q3 || []).map(code => SURVEY_MAP.q3[code] || code).join(', ') || '—';

            div.innerHTML = `
                <div class="flex-1 w-full overflow-hidden">
                    <div class="flex flex-wrap items-center gap-3 mb-4">
                        <span class="bg-indigo-50 text-indigo-600 text-xs font-bold px-2 py-1 rounded-sm uppercase tracking-wider">
                            설계 신청 (Detailed Survey)
                        </span>
                        <span class="text-xs text-slate-400">${dateStr}</span>
                    </div>
                    <h3 class="text-2xl font-bold text-[#0A2540] mb-4">${data.name || '미입력'} / ${data.industry || '미입력'}</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8 mb-6 p-5 bg-slate-50 rounded-xl border border-slate-100">
                        <div class="flex flex-col gap-1">
                            <span class="text-[11px] font-bold text-indigo-500 uppercase">브랜드 컬러</span>
                            <div class="flex items-center gap-2">
                                <span class="text-sm text-slate-800 font-medium">${data.color || '—'}</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[11px] font-bold text-indigo-500 uppercase">디자인 무드</span>
                            <span class="text-sm text-slate-800 font-medium">${mood}</span>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[11px] font-bold text-indigo-500 uppercase">레이아웃 스타일</span>
                            <span class="text-sm text-slate-800 font-medium">${layout}</span>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[11px] font-bold text-indigo-500 uppercase">타이포그래피</span>
                            <span class="text-sm text-slate-800 font-medium">${typo}</span>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[11px] font-bold text-indigo-500 uppercase">인터랙션 강도</span>
                            <span class="text-sm text-slate-800 font-medium">${interaction}</span>
                        </div>
                        <div class="flex flex-col gap-1 md:col-span-2">
                            <span class="text-[11px] font-bold text-indigo-500 uppercase">핵심 섹션</span>
                            <span class="text-sm text-slate-800 font-medium">${sections}</span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="bg-indigo-50/50 p-4 rounded-lg text-sm text-slate-700 leading-relaxed border-l-2 border-indigo-200">
                            <p class="font-bold mb-2 text-indigo-900 text-xs">A. 참고 사이트 URL</p>
                            <div class="text-slate-600 break-all">${data.q6a ? data.q6a : '<span class="text-slate-400">내용 없음</span>'}</div>
                        </div>
                        <div class="bg-indigo-50/50 p-4 rounded-lg text-sm text-slate-700 leading-relaxed border-l-2 border-indigo-200">

                        await deleteDoc(doc(db, 'requests', id));

            });

            div.innerHTML = `

                    <h3 class="text-2xl font-bold text-[#0A2540] mb-4">${data.company}</h3>

                        </div>
                        <div class="flex flex-col">

                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-slate-400 uppercase mb-1">이메일</span>
                            <span class="text-sm text-slate-800 font-semibold break-all">${data.email}</span>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-lg text-sm text-slate-700 whitespace-pre-wrap leading-relaxed border border-slate-100 shadow-sm overflow-hidden">
                        <p class="font-bold mb-3 text-slate-800 border-b border-slate-100 pb-2">문의 내용</p>
                        <div class="break-words">${data.content}</div>
                    </div>
                </div>
                <div class="flex md:flex-col justify-end gap-2 shrink-0 border-t md:border-t-0 md:border-l border-slate-100 pt-4 md:pt-0 md:pl-4">
                    <button class="delete-btn bg-red-50 text-red-500 hover:bg-red-100 p-3 rounded-lg transition-colors flex items-center justify-center gap-2 md:w-full" data-id="${id}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        <span class="md:hidden font-bold">삭제</span>
                    </button>
                </div>
            `;

            div.querySelector('.delete-btn').addEventListener('click', async (e) => {
                if (confirm('이 문의 내역을 정말 삭제하시겠습니까?')) {
                    try {
                        await deleteDoc(doc(db, 'inquiries', id));
                    } catch (err) {
                        alert('삭제 실패: ' + err.message);
                    }
                }
            });

            return div;
        }
    </script>
