            activeBtn.classList.add('bg-[#3B6EFF]', 'text-white');

                portfolioManager.classList.remove('hidden');
                inquiryList.classList.add('hidden');
                emptyState.classList.add('hidden');
                inquiryCount.parentElement.classList.add('hidden');

        // Notification Sound (Simple Beep)
        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            } catch (e) {
                console.warn('Audio feedback failed:', e);
            }
        }

        // Title Flash Notification
        let flashInterval = null;
        function startTitleFlash() {
            if (flashInterval) return;
            const originalTitle = document.title;
            flashInterval = setInterval(() => {
                document.title = document.title === originalTitle ? "🔔 NEW INQUIRY!" : originalTitle;
            }, 1000);
            
            window.addEventListener('mousemove', stopTitleFlash, { once: true });
            window.addEventListener('click', stopTitleFlash, { once: true });
        }

        function stopTitleFlash() {
            if (flashInterval) {
                clearInterval(flashInterval);
                flashInterval = null;
                document.title = "관리자 모드 — 유어스웹 (Yours Web)";
            }
        }

                        <p class="font-bold">🔔 새로운 ${data.type || '문의'} 도착!</p>
                        <p class="text-xs opacity-90">${data.company || '회사명 없음'} - ${data.name || '성함 없음'}님</p>
                    </div>
                </div>
                <button class="mt-2 text-xs font-bold hover:underline self-end">닫기</button>
            `;
            document.body.appendChild(toast);
            
            toast.querySelector('button').onclick = () => toast.remove();
            setTimeout(() => toast.remove(), 10000);
            
            playNotificationSound();
            startTitleFlash();
        }

        // Check password first
        function checkPassword() {
            const inputVal = passwordInput.value.trim();
            if (inputVal === ADMIN_PW) {
                passwordGate.classList.add('hidden');
                adminContent.classList.remove('hidden');
                localStorage.setItem('admin_access', 'true');
                handleAuth();
                pwError.classList.add('hidden');
            } else {
                pwError.classList.remove('hidden');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        loginSubmit.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // On load, check if already unlocked
        if (localStorage.getItem('admin_access') === 'true') {
            passwordGate.classList.add('hidden');
            adminContent.classList.remove('hidden');
        }

        function handleAuth() {
            // Check for redirect result first
            getRedirectResult(auth).catch(err => {
                showError("리다이렉트 결과 처리 중: " + err.message);
            });

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userNameSpan.textContent = `${user.displayName} (${user.email})`;
                    userNameSpan.classList.remove('hidden');
                    authBtn.textContent = '로그아웃';
                    authRedirectBtn.classList.add('hidden');
                    
                    adminContent.classList.remove('hidden'); // Ensure visible
                    if (user.email === ADMIN_EMAIL) {
                        noAccess.classList.add('hidden');
                        loadData();
                    } else {
                        inquiryList.innerHTML = '';
                        const noAccessMsg = noAccess.querySelector('p');
                        if (noAccessMsg) noAccessMsg.textContent = `현재 계정(${user.email})은 관리자 권한이 없습니다.`;
                        noAccess.classList.remove('hidden');
                    }
                } else {
                    userNameSpan.classList.add('hidden');
                    authBtn.textContent = 'Google 로그인 (팝업)';
                    authRedirectBtn.classList.remove('hidden');
                    authRedirectBtn.textContent = 'Google 로그인 (리다이렉트)';
                    inquiryList.innerHTML = '';
                    
                    // Show content area so login prompts are visible if they unlocked it
                    if (localStorage.getItem('admin_access') === 'true') {
                        adminContent.classList.remove('hidden');
                    }
                }
            });
        }

        function showError(msg) {
            errorAlert.textContent = msg;
            errorAlert.classList.remove('hidden');
            setTimeout(() => errorAlert.classList.add('hidden'), 10000);
        }

        if (localStorage.getItem('admin_access') === 'true') handleAuth();

        authBtn.addEventListener('click', () => {
            if (auth.currentUser) {
                signOut(auth);
                localStorage.removeItem('admin_access');
                location.reload();
            } else {
                authBtn.disabled = true;
                authBtn.textContent = '로그인 중...';
                signInWithPopup(auth, provider).then(() => {
                    authBtn.disabled = false;
                }).catch(err => {
                    authBtn.disabled = false;
                    authBtn.textContent = 'Google 로그인 (팝업)';
                    console.error("Login failed:", err);
                    
                    let errorMsg = "로그인 중 오류가 발생했습니다.";
                    if (err.code === 'auth/popup-blocked') {
                        errorMsg = "팝업이 차단되었습니다. 모바일이라면 아래 '리다이렉트' 버튼을 사용해보세요.";
                    } else if (err.code === 'auth/unauthorized-domain') {
                        errorMsg = "승인되지 않은 도메인입니다.";
                    } else {
                        errorMsg = err.message;
                    }
                    
                    showError(errorMsg);
                    alert(errorMsg);
                });
            }
        });

        authRedirectBtn.addEventListener('click', () => {
            signInWithRedirect(auth, provider);
        });

        function loadData() {
            loadInquiries();
            loadRequests();
            loadPortfolio();
        }

        function loadPortfolio() {
            const q = query(collection(db, 'portfolio'), orderBy('createdAt', 'desc'));
            onSnapshot(q, (snapshot) => {
                allPortfolio = [];
                snapshot.forEach(docSnap => {
                    allPortfolio.push({ id: docSnap.id, data: docSnap.data() });
                });
                renderPortfolio();
            });
        }

        function renderPortfolio() {
            portfolioGrid.innerHTML = '';
            portfolioCount.textContent = allPortfolio.length;

            // Sort by pinned first, then date
            const sortedPortfolio = [...allPortfolio].sort((a, b) => {
                if (a.data.isPinned && !b.data.isPinned) return -1;
                if (!a.data.isPinned && b.data.isPinned) return 1;
                return (b.data.createdAt?.toDate() || 0) - (a.data.createdAt?.toDate() || 0);
            });

            sortedPortfolio.forEach(item => {
                const div = document.createElement('div');
                const isPinned = item.data.isPinned === true;
                div.className = `bg-white rounded-lg border ${isPinned ? 'border-[#3B6EFF] ring-1 ring-[#3B6EFF]/20' : 'border-slate-200'} overflow-hidden shadow-sm group relative`;
                div.innerHTML = `
                    <div class="aspect-square bg-slate-100 overflow-hidden relative">
                        <img src="${item.data.imageUrl}" class="w-full h-full object-cover object-top transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/400?text=Invalid+Image';">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                             <button class="edit-p-btn p-2 bg-white/20 hover:bg-white/40 text-white rounded-full transition-colors" title="수정">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                             </button>
                             <button class="pin-p-btn p-2 ${isPinned ? 'bg-[#3B6EFF]' : 'bg-white/20 hover:bg-white/40'} text-white rounded-full transition-colors" data-id="${item.id}" title="${isPinned ? '고정 해제' : '상단 고정'}">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                             </button>
                             <button class="delete-p-btn p-2 bg-red-500 text-white rounded-full hover:bg-red-600 transition-colors" data-id="${item.id}">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                             </button>
                        </div>
                        ${isPinned ? '<div class="absolute top-2 left-2 bg-[#3B6EFF] text-white text-[9px] font-bold px-1.5 py-0.5 rounded-sm uppercase tracking-tighter">Pinned</div>' : ''}
                    </div>
                    <div class="p-4 text-center">
                        <div class="text-[10px] font-bold text-brand-accent uppercase mb-1">${item.data.category}</div>
                        <h4 class="font-bold text-slate-800 truncate mb-1">${item.data.title}</h4>
                        <p class="text-[11px] text-slate-500 truncate">${item.data.subtitle || '설명 없음'}</p>
                    </div>
                `;
                
                div.querySelector('.edit-p-btn').onclick = () => enterEditMode(item);
                
                div.querySelector('.pin-p-btn').onclick = async () => {
                    try {
                        await updateDoc(doc(db, 'portfolio', item.id), {
                            isPinned: !isPinned
                        });
                    } catch (err) { alert('업데이트 실패: ' + err.message); }
                };

                div.querySelector('.delete-p-btn').onclick = async () => {
                    if (confirm('이 포트폴리오를 삭제하시겠습니까?')) {
                        try {
                            await deleteDoc(doc(db, 'portfolio', item.id));
                        } catch (err) { alert('삭제 실패: ' + err.message); }
                    }
                };
                
                portfolioGrid.appendChild(div);
            });
        }

        portfolioForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            const originalBtnText = btn.innerHTML;
            btn.textContent = editMode ? '수정 중...' : '등록 중...';
            
            const formData = {
                title: document.getElementById('p-title').value,
                category: document.getElementById('p-category').value,
                imageUrl: document.getElementById('p-image').value,
                link: document.getElementById('p-link').value || '',
                subtitle: document.getElementById('p-subtitle').value || '',
                isPinned: document.getElementById('p-pinned').checked,
                createdAt: serverTimestamp() // Note: On update we might want to keep original? But the rules check request.time
            };

            try {
                if (editMode) {
                    await updateDoc(doc(db, 'portfolio', editingId), formData);
                    alert('수정되었습니다.');
                    exitEditMode();
                } else {
                    await addDoc(collection(db, 'portfolio'), formData);
                    portfolioForm.reset();
                    alert('등록되었습니다.');
                }
            } catch (err) {
                alert((editMode ? '수정' : '등록') + ' 실패: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalBtnText;
            }
        };

        function loadInquiries() {
            const q = query(collection(db, 'inquiries'), orderBy('createdAt', 'desc'));
            
            inquiryUnsubscribe = onSnapshot(q, (snapshot) => {
                renderInquiries(snapshot);
            }, (error) => {
                console.error("Inquiries error:", error);
                showError("일반 문의 불러오기 실패: " + error.message);
                if (error.message.includes('permission')) noAccess.classList.remove('hidden');
            });
        }

        function loadRequests() {
            const q = query(collection(db, 'requests'), orderBy('timestamp', 'desc'));
            
            requestUnsubscribe = onSnapshot(q, (snapshot) => {
                renderRequests(snapshot);
            }, (error) => {
                console.error("Requests error:", error);
                showError("상세 설문 불러오기 실패: " + error.message);
            });
        }

        function renderAll() {
            inquiryList.innerHTML = '';
            
            let filteredInquiries = [...allInquiries].sort((a, b) => (b.data.createdAt?.toDate() || 0) - (a.data.createdAt?.toDate() || 0));
            let filteredRequests = [...allRequests].sort((a, b) => (b.data.timestamp?.toDate() || 0) - (a.data.timestamp?.toDate() || 0));

            const showInquiry = currentTab === 'all' || currentTab === 'inquiry';
            const showRequest = currentTab === 'all' || currentTab === 'request';

            inquiryCount.textContent = (showInquiry ? filteredInquiries.length : 0) + (showRequest ? filteredRequests.length : 0);

            if (filteredInquiries.length === 0 && filteredRequests.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');

            // Render Requests Board
            if (showRequest && filteredRequests.length > 0) {
                const section = document.createElement('div');
                section.className = 'mb-16';
                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-6 pb-2 border-b-2 border-indigo-500">
                        <h2 class="text-xl font-bold text-[#0A2540]">상세 설계 설문 게시판</h2>
                        <span class="bg-indigo-100 text-indigo-600 text-xs font-bold px-2 py-0.5 rounded-full">${filteredRequests.length}</span>
                    </div>
                    <div class="grid gap-6" id="request-board-list"></div>
                `;
                inquiryList.appendChild(section);
                const listContainer = section.querySelector('#request-board-list');
                filteredRequests.forEach(item => {
                    listContainer.appendChild(createRequestCard(item.id, item.data));
                });
            }

            // Render Inquiries Board
            if (showInquiry && filteredInquiries.length > 0) {
                const section = document.createElement('div');
                section.className = 'mb-16';
                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-6 pb-2 border-b-2 border-blue-500">
                        <h2 class="text-xl font-bold text-[#0A2540]">유지보수 · 일반 문의 게시판</h2>
                        <span class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-0.5 rounded-full">${filteredInquiries.length}</span>
                    </div>
                    <div class="grid gap-6" id="inquiry-board-list"></div>
                `;
                inquiryList.appendChild(section);
                const listContainer = section.querySelector('#inquiry-board-list');
                filteredInquiries.forEach(item => {
                    listContainer.appendChild(createInquiryCard(item.id, item.data));
                });
            }
        }

        function renderInquiries(snapshot) {
            allInquiries = [];
            snapshot.forEach(docSnap => {
                allInquiries.push({ id: docSnap.id, data: docSnap.data() });
            });
            
            const newest = allInquiries[0];
            if (!isInitialLoad && newest && newest.id !== lastInquiryId) {
                showNotificationToast({ ...newest.data, type: '일반 문의' });
                lastInquiryId = newest.id;
            } else if (isInitialLoad && newest) {
                lastInquiryId = newest.id;
            }
            
            renderAll();
        }

        function renderRequests(snapshot) {
            allRequests = [];
            snapshot.forEach(docSnap => {
                allRequests.push({ id: docSnap.id, data: docSnap.data() });
            });
            
            const newest = allRequests[0];
            if (!isInitialLoad && newest && newest.id !== lastRequestId) {
                showNotificationToast({ 
                    company: newest.data.industry || 'Survey', 
                    name: newest.data.name || 'Anonymous',
                    type: '설계 신청' 
                });
                lastRequestId = newest.id;
            } else if (isInitialLoad && newest) {
                lastRequestId = newest.id;
            }

            renderAll();
            isInitialLoad = false;
        }

            try {
                await updateDoc(doc(db, collectionName, id), {
                    adminComment: comment,
                    lastCommentedAt: new Date()
                });
                return true;
            } catch (err) {
                console.error("Comment save failed:", err);
                alert("코멘트 저장에 실패했습니다: " + err.message);
                return false;
            }
        }

                btn.textContent = '저장 중...';

                    btn.textContent = originalText;
                }
            };

            div.querySelector('.delete-btn').addEventListener('click', async (e) => {
                if (confirm('이 설계 신청 내역을 정말 삭제하시겠습니까?')) {
                    try {
                        await deleteDoc(doc(db, 'requests', id));
                    } catch (err) {
                        alert('삭제 실패: ' + err.message);
                    }
                }
            });

            return div;
        }

        function createInquiryCard(id, data) {
            const div = document.createElement('div');
            div.className = 'inquiry-card bg-white border border-slate-200 rounded-lg overflow-hidden border-l-4 border-l-blue-500 shadow-sm transition-all duration-300';
            
            const date = data.createdAt?.toDate ? data.createdAt.toDate() : new Date();
            const dateStr = date.toLocaleString('ko-KR', { 
                year: 'numeric', month: '2-digit', day: '2-digit', 
                hour: '2-digit', minute: '2-digit' 
            });

            const commentValue = data.adminComment || '';

            div.innerHTML = `
                <!-- Header (Visible) -->
                <div class="p-6 cursor-pointer hover:bg-slate-50 flex justify-between items-center group sticky top-0 bg-white z-10 border-b border-transparent transition-colors toggle-trigger">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="bg-blue-50 text-blue-600 text-[10px] sm:text-xs font-bold px-2 py-0.5 rounded-sm uppercase tracking-wider">${data.type || '일반 문의'}</span>
                            <span class="text-[10px] sm:text-xs text-slate-400">${dateStr}</span>
                            ${commentValue ? '<span class="bg-amber-100 text-amber-700 text-[10px] px-1.5 rounded-full font-bold">코멘트 있음</span>' : ''}
                        </div>
                        <h3 class="text-base sm:text-lg font-bold text-[#0A2540] truncate">
                            ${data.company} - ${data.name}
                        </h3>
                    </div>
                    <div class="flex items-center gap-3 shrink-0 ml-4">
                        <svg class="w-5 h-5 text-slate-300 group-hover:text-slate-500 transform transition-transform duration-300 arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                </div>

                <!-- Body (Collapsible) -->
                <div class="card-details hidden border-t border-slate-100">
                    <div class="p-6 sm:p-8">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 p-4 bg-slate-50 rounded-lg border border-slate-100">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-slate-400 uppercase mb-0.5">담당자</span>
                                <span class="text-sm text-slate-800 font-semibold">${data.name}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-slate-400 uppercase mb-0.5">연락처</span>
                                <span class="text-sm text-slate-800 font-semibold">${data.phone}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-slate-400 uppercase mb-0.5">이메일</span>
                                <span class="text-sm text-slate-800 font-semibold break-all">${data.email}</span>
                            </div>
                        </div>

                        <div class="bg-slate-50/50 p-6 rounded-lg text-sm text-slate-700 whitespace-pre-wrap leading-relaxed border border-slate-100 mb-8">
                            <p class="font-bold mb-3 text-slate-800 border-b border-slate-200 pb-2 text-xs">문의 내용</p>
                            <div class="break-words text-xs leading-relaxed">${data.content}</div>
                        </div>

                        <!-- Comment Section -->
                        <div class="mt-8 pt-8 border-t border-slate-100">
                            <div class="flex items-center gap-2 mb-3">
                                <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                <h4 class="text-sm font-bold text-slate-800">관리자 메모</h4>
                            </div>
                            <textarea class="comment-input w-full p-4 bg-amber-50/30 border border-amber-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-200 min-h-[100px] placeholder:text-slate-300" placeholder="기억해야 할 사항이나 진행 상태를 메모하세요...">${commentValue}</textarea>
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-[10px] text-slate-400">${data.lastCommentedAt ? '마지막 수정: ' + data.lastCommentedAt.toDate().toLocaleString() : ''}</span>
                                <div class="flex gap-2">
                                    <button class="save-comment-btn bg-amber-500 text-white px-4 py-2 rounded text-xs font-bold hover:bg-amber-600 transition-colors">메모 저장</button>
                                    <button class="delete-btn bg-red-50 text-red-500 hover:bg-red-100 px-4 py-2 rounded text-xs font-bold transition-colors">데이터 삭제</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Toggle functionality
            const trigger = div.querySelector('.toggle-trigger');
            const details = div.querySelector('.card-details');
            const arrow = div.querySelector('.arrow-icon');

            trigger.onclick = () => {
                const isHidden = details.classList.contains('hidden');
                details.classList.toggle('hidden');
                arrow.classList.toggle('rotate-180', isHidden);
                trigger.classList.toggle('border-slate-100', isHidden);
            };

            // Comment Save
            div.querySelector('.save-comment-btn').onclick = async (e) => {
                const btn = e.currentTarget;
                const originalText = btn.textContent;
                btn.disabled = true;
                btn.textContent = '저장 중...';
                
                const comment = div.querySelector('.comment-input').value;
                const success = await saveComment('inquiries', id, comment);
                
                if (success) {
                    btn.textContent = '저장 완료!';
                    btn.classList.replace('bg-amber-500', 'bg-green-500');
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.classList.replace('bg-green-500', 'bg-amber-500');
                        btn.disabled = false;
                    }, 2000);
                } else {
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            };

            div.querySelector('.delete-btn').addEventListener('click', async (e) => {
                if (confirm('이 문의 내역을 정말 삭제하시겠습니까?')) {
                    try {
                        await deleteDoc(doc(db, 'inquiries', id));
                    } catch (err) {
                        alert('삭제 실패: ' + err.message);
                    }
                }
            });

            return div;
        }
    </script>
</body>
</html>
