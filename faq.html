<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - 유어스웹</title>
    <!-- Favicon -->
    <link rel="icon" href="https://mydrim.net/img/logo_yoursweb.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#0A2540',
                            accent: '#3B6EFF',
                            offwhite: '#F4F6FA',
                            text: '#0F1A2E',
                            body: '#4A5468',
                            caption: '#8A94A6',
                            divider: '#E5E9F0'
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard Variable', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Pretendard Variable', sans-serif; }
        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
        }
        .faq-item.active .faq-answer {
            max-height: 500px;
            padding-top: 1.5rem;
            padding-bottom: 2rem;
        }
        .faq-item.active .faq-icon {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-brand-offwhite text-brand-navy">
    <!-- Header -->
    <header class="fixed top-0 left-0 w-full z-[100] bg-white/80 backdrop-blur-xl border-b border-brand-navy/5 py-4">
        <div class="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
            <a href="/" class="flex items-center">
                <img src="https://mydrim.net/img/logo_yoursweb.png" alt="유어스웹" class="h-8 md:h-9 w-auto">
            </a>
            <nav class="hidden md:flex space-x-12 font-bold text-base tracking-wide">
                <a href="/service" class="hover:text-brand-accent transition-colors">서비스</a>
                <a href="/portfolio" class="hover:text-brand-accent transition-colors">포트폴리오</a>
                <a href="/pricing" class="hover:text-brand-accent transition-colors">비용안내</a>
                <a href="/faq" class="text-brand-accent">FAQ</a>
                <a href="/about" class="hover:text-brand-accent transition-colors">회사소개</a>
            </nav>
            <a href="/request.html" class="bg-brand-navy text-white px-6 py-2.5 rounded-[4px] font-bold text-sm">상담/문의</a>
        </div>
    </header>

    <main class="pt-32 pb-24">
        <section class="max-w-4xl mx-auto px-6 mb-16 md:mb-24 text-center">
            <span class="text-brand-accent font-bold text-xs tracking-widest uppercase mb-4 block">Frequently Asked Questions</span>
            <h1 class="text-3xl md:text-5xl font-extrabold tracking-tighter mb-8 italic">자주 묻는 질문</h1>
            <p class="text-brand-body text-sm md:text-lg">
                궁금하신 점이 있으신가요? 가장 많이 질문하시는 내용들을 정리했습니다.<br>더 자세한 상담이 필요하시면 주저 말고 연락주세요.
            </p>
        </section>

        <section class="max-w-3xl mx-auto px-6 space-y-4" id="faq-list">
            <!-- FAQ items will be injected here -->
            <div class="animate-pulse space-y-4">
                <div class="h-16 bg-white rounded-xl"></div>
                <div class="h-16 bg-white rounded-xl"></div>
                <div class="h-16 bg-white rounded-xl"></div>
            </div>
        </section>

        <section class="max-w-4xl mx-auto px-6 mt-24 text-center">
            <div class="p-10 md:p-16 bg-white rounded-3xl border border-brand-divider shadow-sm">
                <h2 class="text-2xl font-bold mb-6">원하시는 답변을 찾지 못하셨나요?</h2>
                <p class="text-brand-body mb-10">전문 상담원이 영업시간 내에 친절히 안내해 드립니다.</p>
                <div class="flex flex-col md:flex-row justify-center gap-4">
                    <a href="/request.html" class="bg-brand-accent text-white px-8 py-4 rounded-full font-bold shadow-lg hover:scale-105 transition-all">실시간 제작 문의</a>
                    <a href="tel:1844-1814" class="bg-brand-navy text-white px-8 py-4 rounded-full font-bold hover:scale-105 transition-all">전화 상담하기</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-white py-12 border-t border-brand-divider text-center">
        <div class="max-w-7xl mx-auto px-6">
            <p class="text-brand-caption text-sm mb-4">© 2026 Yours Web. All rights reserved.</p>
            <div class="flex justify-center space-x-6 text-brand-body text-xs font-bold">
                <a href="/about">회사소개</a>
                <a href="/service">서비스</a>
                <a href="/portfolio">포트폴리오</a>
                <a href="/admin">관리자</a>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
        import { getFirestore, collection, query, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js';

        const firebaseConfig = {
            projectId: "yoursweb-de245",
            appId: "1:299282121947:web:8f1cb5db8c1dfbf894f8fe",
            apiKey: "AIzaSyDB6KhmbXGbiW8LiNgd5qZyk-TnLJ_cMG4",
            authDomain: "yoursweb-de245.firebaseapp.com",
            storageBucket: "yoursweb-de245.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-c74210e1-7359-47ff-9653-df6e4c38a1ea");

        const faqList = document.getElementById('faq-list');

        function renderFaqs(faqs) {
            if (faqs.length === 0) {
                faqList.innerHTML = '<p class="text-center text-brand-caption py-12">등록된 FAQ가 없습니다.</p>';
                return;
            }

            faqList.innerHTML = faqs.map(faq => `
                <div class="faq-item bg-white rounded-2xl border border-brand-divider overflow-hidden group transition-all hover:shadow-md">
                    <button class="w-full px-8 py-6 flex justify-between items-center text-left focus:outline-none faq-toggle">
                        <span class="text-base md:text-lg font-bold text-brand-navy">${faq.question}</span>
                        <svg class="faq-icon w-6 h-6 text-brand-caption transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div class="faq-answer px-8">
                        <div class="text-brand-body leading-relaxed whitespace-pre-wrap">${faq.answer}</div>
                    </div>
                </div>
            `).join('');

            // Toggle logic
            document.querySelectorAll('.faq-item').forEach(item => {
                const toggle = item.querySelector('.faq-toggle');
                toggle.addEventListener('click', () => {
                    const isActive = item.classList.contains('active');
                    
                    // Close all
                    document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('active'));
                    
                    // Open clicked if it wasn't active
                    if (!isActive) item.classList.add('active');
                });
            });
        }

        const q = query(collection(db, 'faqs'), orderBy('order', 'asc'));
        onSnapshot(q, (snapshot) => {
            const faqs = [];
            snapshot.forEach(doc => faqs.push({ id: doc.id, ...doc.data() }));
            renderFaqs(faqs);
        });
    </script>
</body>
</html>
